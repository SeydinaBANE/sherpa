<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sherpa — Tuteur IA</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --line: #262b36;
        --text: #e7ebf0;
        --muted: #9aa4b2;
        --accent: #6ea8fe;
        --accent-soft: #1e2940;
        --ok: #4ade80;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      header {
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 0.2px; }
      header span { color: var(--muted); font-size: 13px; }
      main {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 1px;
        background: var(--line);
        min-height: calc(100vh - 59px);
      }
      .panel { background: var(--panel); padding: 20px; }
      .panel h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--muted);
        margin: 0 0 14px;
      }
      label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 5px; }
      input[type="text"], textarea {
        width: 100%;
        background: #0e1117;
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 8px;
        padding: 9px 11px;
        font: inherit;
      }
      textarea { resize: vertical; min-height: 96px; }
      button {
        background: var(--accent);
        color: #08111f;
        border: 0;
        border-radius: 8px;
        padding: 9px 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 12px;
      }
      button.secondary { background: var(--accent-soft); color: var(--text); }
      button:disabled { opacity: 0.5; cursor: progress; }
      .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
      .chat { display: flex; flex-direction: column; height: calc(100vh - 59px); }
      .messages { flex: 1; overflow-y: auto; padding: 24px; }
      .composer { border-top: 1px solid var(--line); padding: 16px 24px; display: flex; gap: 10px; }
      .composer input { flex: 1; }
      .composer button { margin: 0; }
      .msg { max-width: 720px; margin: 0 0 18px; }
      .msg .role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 4px; }
      .bubble { background: #0e1117; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
      .tag { display: inline-block; font-size: 11px; background: var(--accent-soft); color: var(--accent); padding: 2px 8px; border-radius: 999px; margin-bottom: 8px; }
      .citation { font-size: 12px; color: var(--muted); border-left: 2px solid var(--line); padding-left: 8px; margin-top: 6px; }
      .qcard { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
      .qcard ul { margin: 6px 0 0; padding-left: 18px; }
      .qcard li.correct { color: var(--ok); }
      .day { margin-bottom: 10px; }
      .day b { color: var(--accent); }
      .empty { color: var(--muted); font-size: 14px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Sherpa</h1>
      <span>Tuteur IA — RAG ancré, agents &amp; orchestration</span>
    </header>
    <main>
      <section class="panel">
        <h2>1 · Cours</h2>
        <label for="course">Identifiant du cours</label>
        <input id="course" type="text" value="bio" />

        <label for="source">Source (titre)</label>
        <input id="source" type="text" value="cours.txt" />

        <label for="text">Contenu du cours</label>
        <textarea id="text">La photosynthèse transforme la lumière en énergie chimique dans les chloroplastes des plantes.</textarea>
        <button id="ingest">Ingérer le texte</button>

        <label for="file">…ou un fichier (.pdf / .txt / .md)</label>
        <input id="file" type="file" accept=".pdf,.txt,.md" />
        <button id="ingestFile" class="secondary">Ingérer le fichier</button>
        <p class="hint" id="ingestStatus"></p>
      </section>

      <section class="chat">
        <div class="messages" id="messages">
          <p class="empty">
            Pose une question, demande « un quiz sur … » ou « un plan de révision … ».
          </p>
        </div>
        <div class="composer">
          <input id="message" type="text" placeholder="Explique la photosynthèse / Donne-moi un quiz / Fais un plan…" />
          <button id="send">Envoyer</button>
        </div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const messages = $("messages");

      const escape = (value) =>
        String(value).replace(/[&<>"]/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]
        );

      function clearEmpty() {
        const empty = messages.querySelector(".empty");
        if (empty) empty.remove();
      }

      function addMessage(role, html) {
        clearEmpty();
        const wrap = document.createElement("div");
        wrap.className = "msg";
        wrap.innerHTML = `<div class="role">${escape(role)}</div><div class="bubble">${html}</div>`;
        messages.appendChild(wrap);
        messages.scrollTop = messages.scrollHeight;
      }

      async function postJSON(url, body) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        return { ok: res.ok, status: res.status, data };
      }

      function renderAnswer(data) {
        const citations = (data.citations || [])
          .map((c) => `<div class="citation">[${escape(c.source)}:${c.ordinal}] ${escape(c.snippet)}</div>`)
          .join("");
        return `<span class="tag">tutor</span><div>${escape(data.answer)}</div>${citations}`;
      }

      function renderQuiz(data) {
        const cards = data.questions
          .map((q) => {
            const items = q.choices
              .map((choice, i) => `<li class="${i === q.answer_index ? "correct" : ""}">${escape(choice)}</li>`)
              .join("");
            return `<div class="qcard"><b>${escape(q.question)}</b><ul>${items}</ul><div class="citation">${escape(q.explanation)}</div></div>`;
          })
          .join("");
        return `<span class="tag">quiz · ${escape(data.topic)}</span>${cards}`;
      }

      function renderPlan(data) {
        const days = data.items
          .map((it) => `<div class="day"><b>Jour ${it.day}</b> — ${escape(it.topic)}<ul>${it.activities.map((a) => `<li>${escape(a)}</li>`).join("")}</ul></div>`)
          .join("");
        return `<span class="tag">plan de révision</span>${days}`;
      }

      async function send() {
        const message = $("message").value.trim();
        if (!message) return;
        const course_id = $("course").value.trim();
        addMessage("vous", escape(message));
        $("message").value = "";
        $("send").disabled = true;
        const { ok, status, data } = await postJSON("/assistant", { course_id, message });
        if (!ok) {
          addMessage("sherpa", `<span class="tag">erreur ${status}</span>${escape(data.detail || "échec")}`);
        } else if (data.intent === "quiz" && data.quiz) {
          addMessage("sherpa", renderQuiz(data.quiz));
        } else if (data.intent === "plan" && data.plan) {
          addMessage("sherpa", renderPlan(data.plan));
        } else if (data.answer) {
          addMessage("sherpa", renderAnswer(data.answer));
        } else {
          addMessage("sherpa", escape(JSON.stringify(data)));
        }
        $("send").disabled = false;
      }

      async function ingestText() {
        const body = {
          course_id: $("course").value.trim(),
          source: $("source").value.trim(),
          text: $("text").value.trim(),
        };
        $("ingestStatus").textContent = "Ingestion…";
        const { ok, data } = await postJSON("/ingest", body);
        $("ingestStatus").textContent = ok
          ? `✓ ${data.chunks_created} chunk(s) indexé(s)`
          : "Échec de l'ingestion";
      }

      async function ingestFile() {
        const input = $("file");
        if (!input.files.length) {
          $("ingestStatus").textContent = "Sélectionne un fichier d'abord.";
          return;
        }
        const form = new FormData();
        form.append("course_id", $("course").value.trim());
        form.append("file", input.files[0]);
        $("ingestStatus").textContent = "Ingestion du fichier…";
        const res = await fetch("/ingest/file", { method: "POST", body: form });
        const data = await res.json().catch(() => ({}));
        $("ingestStatus").textContent = res.ok
          ? `✓ ${data.chunks_created} chunk(s) indexé(s)`
          : `Échec (${res.status})`;
      }

      $("send").addEventListener("click", send);
      $("message").addEventListener("keydown", (e) => {
        if (e.key === "Enter") send();
      });
      $("ingest").addEventListener("click", ingestText);
      $("ingestFile").addEventListener("click", ingestFile);
    </script>
  </body>
</html>
